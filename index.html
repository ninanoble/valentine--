<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen, Shema</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff6f61, #ffcc00);
            font-family: 'Dancing Script', cursive;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 4rem;
            animation: float 3s infinite ease-in-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        p {
            font-size: 1.8rem;
            margin: 20px 0;
            animation: fadeIn 2s ease-in-out;
        }

        .heart {
            width: 100px;
            height: 100px;
            background: #ff4d4d;
            position: relative;
            transform: rotate(45deg);
            animation: heartbeat 1.5s infinite;
            margin: 50px auto;
        }

        .heart::before,
        .heart::after {
            content: '';
            width: 100px;
            height: 100px;
            background: #ff4d4d;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -50px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: -50px;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1) rotate(45deg);
            }
            50% {
                transform: scale(1.1) rotate(45deg);
            }
        }

        .fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .firework {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #fff;
            border-radius: 50%;
            animation: explode 1.5s infinite ease-out;
        }

        @keyframes explode {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(10);
                opacity: 0;
            }
        }

        .love-text {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6f61, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            0% {
                text-shadow: 0 0 10px rgba(255, 111, 97, 0.8);
            }
            100% {
                text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>To My Queen, Shema 👑</h1>
        <p>You are the most beautiful soul I've ever known. 🌟</p>
        <p>Your love is my strength, your smile is my joy. 💖</p>
        <p>Every moment with you feels like a dream. 🌙✨</p>
        <p>I love you more than words can ever express. 💌</p>
        <div class="heart"></div>
        <div class="love-text">Forever Yours, Noble</div>
    </div>

    <div class="fireworks">
        <!-- Fireworks will be generated here -->
    </div>

    <script>
        // Create fireworks
        const fireworksContainer = document.querySelector('.fireworks');

        function createFirework() {
            const firework = document.createElement('div');
            firework.classList.add('firework');
            firework.style.left = `${Math.random() * 100}%`;
            firework.style.top = `${Math.random() * 100}%`;
            firework.style.animationDuration = `${Math.random() * 1 + 1}s`;
            fireworksContainer.appendChild(firework);

            setTimeout(() => {
                firework.remove();
            }, 1500);
        }

        setInterval(createFirework, 300);

        // Add a glowing effect to the text
        const loveText = document.querySelector('.love-text');
        setInterval(() => {
            loveText.style.transform = `scale(${1 + Math.random() * 0.1})`;
        }, 500);
    </script>
</body>
</html>
